<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtLab Дзвінчук</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="header">
        <div class="logo">ArtLab Дзвінчук</div>
        <nav>
            <a href="#">Портфоліо</a>
            <a href="#">Послуги</a>
            <a href="#">Контакти</a>
        </nav>
    </header>

    <main>
        <section class="portfolio">
            <h2>Останні роботи</h2>
            <div class="gallery">
                <img src="https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=600&h=600&fit=crop" alt="Дизайн інтер'єру 1">
                <img src="https://images.unsplash.com/photo-1616137466211-f939a420be84?w=600&h=600&fit=crop" alt="Дизайн інтер'єру 2">
                <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=600&h=600&fit=crop" alt="Дизайн інтер'єру 3">
                <img src="https://images.unsplash.com/photo-1616486029423-aaa4789e8c9a?w=600&h=600&fit=crop" alt="Дизайн інтер'єру 4">
                <img src="https://images.unsplash.com/photo-1615873968403-89e068629265?w=600&h=600&fit=crop" alt="Дизайн інтер'єру 5">
                <img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=600&h=600&fit=crop" alt="Дизайн інтер'єру 6">
            </div>
        </section>
    </main>

    <footer>
        <p>вул. Незалежності 136, м. Івано-Франківськ | 2026</p>
    </footer>

    <script>
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
